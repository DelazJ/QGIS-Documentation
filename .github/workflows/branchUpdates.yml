name: Branch updates

# on schedule and dispatch runs, the workflow will build the 3 different Docker images (master, PR, LTR)
# on tags, it will build only the image of the given tag
# this is made by using a matrix defined in a dedicated job

on:
  schedule:
    # scheduled at 3:30 every day
    - cron:  '30 3 * * *'

  workflow_dispatch:

jobs:

  define-strategy:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
      - id: matrix
        run: |
            echo "::set-output name=matrix::{\"branch\":[\"master\", \"release_3.16\"]}"


  sync_with_upstream:
    runs-on: ubuntu-latest
    needs: define-strategy
    name: Sync branches with upstream latest

    strategy:
      matrix: ${{ fromJSON( needs.define-strategy.outputs.matrix ) }}

    steps:
    - name: Checkout ${{ matrix.branch }}
      uses: actions/checkout@v2
      with:
        ref: ${{ matrix.branch }}

    - name: Pull upstream ${{ matrix.branch }} changes
      id: sync
      uses: aormsby/Fork-Sync-With-Upstream-action@v2.2
      with:
        upstream_repository: qgis/QGIS-Documentation
        upstream_branch: ${{ matrix.branch }}
        target_branch: ${{ matrix.branch }}

    - name: Timestamp
      run: date

    # Display a message if 'sync' step had new commits (simple test)
    - name: Check for new commits
      if: steps.sync.outputs.has_new_commits
      run: echo "There were new commits in ${{ matrix.branch }}."


