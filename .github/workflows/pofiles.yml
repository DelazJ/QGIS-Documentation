name: Generate translation Files V2

on:
  #push:
   # branches:
    ##  - "release_3.16"
    #paths:
     # - 'docs/**'

  schedule: #run at 04:00 every day
    - cron:  '5 * * * *'

jobs:
  prepare_translation:

    runs-on: ubuntu-latest

    steps:
    - name: checkout
      uses: actions/checkout@v2
      with:
        ref: release_3.16

    - name: Set up Python 3.7
      uses: actions/setup-python@v1
      with:
        python-version: 3.7

    - name: Install dependencies
      run: |
          python -m pip install --upgrade pip
          pip install -r REQUIREMENTS.txt

    - name: Generate English PO files
      id: "generate-po-files"
      run: |
          make gettext
          sphinx-intl update -p build/gettext -l en
          # An attempt to find whether files got updated in the repo with the commands above
          echo "::set-output name=count_modifs::$(find locale/en/LC_MESSAGES/docs -type f -name '*.po' -mmin -5 -ls | wc -l)"

    - name: Read the outputs
      run: |
          echo ${{steps.generate-po-files.outputs.count_modifs}}

    - name: Echo changes
      if: steps.generate-po-files.outputs.count_modifs > 0
      run: |
          echo "Changes detected!"

    - name: Update the PO files if there are changes
      id: "auto-commit-action"
      #if: steps.generate-po-files.outputs.count_modifs > 0
      uses: stefanzweifel/git-auto-commit-action@v4
      with:
        commit_message: Update English PO files

    - name: "Run if changes have been detected"
      if: steps.auto-commit-action.outputs.changes_detected == 'true'
      run: |
          echo "Changes committed!"

    - name: "Run if no changes have been detected"
      #if: steps.generate-po-files.outputs.count_modifs == 0
      if: steps.auto-commit-action.outputs.changes_detected == 'false'
      run: echo "No Changes detected!"
