name: Generate translation Files

on:
  # pull-request:
  push:
    branches:
      - "release_3.16"
      #- "release_3.16_withPO"
  # schedule: #run at 04:00 every day
    # - cron:  '00 04 * * *'

jobs:
  merge-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Merge back the changes
        uses: everlytic/branch-merge@1.1.0
        with:
          github_token: ${{ github.token }}
          source_ref: 'release_3.16'
          target_branch: 'latest'
          commit_message_template: '[Automated] Merged release_3.16 into target latest'

      - name: Set up Python 3.7
        uses: actions/setup-python@v1
        with:
          python-version: 3.7

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r REQUIREMENTS.txt
      - name: Generate English PO files
        run: |
          make gettext
          sphinx-intl update -p build/gettext -l en
      - uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: Update English PO files
          branch: latest

